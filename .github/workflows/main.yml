name: main
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"
      - uses: actions/checkout@v3
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=300s

  test:
    name: Test
    runs-on: ubuntu-latest

    # TODO Set up Kind for integration tests.

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"
      - name: Install Kubebuilder
        id: install-kubebuilder
        run: |
          os=$(go env GOOS)
          arch=$(go env GOARCH)
          version=1.30.0
          curl -L https://storage.googleapis.com/kubebuilder-tools/kubebuilder-tools-${version}-${os}-${arch}.tar.gz | tar -xz -C /tmp/
          sudo mv /tmp/kubebuilder /usr/local/kubebuilder
      - run: make test

  build:
    name: Container Build
    runs-on: ubuntu-latest
    needs:
    - test
    - lint
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
    outputs:
      version: ${{ steps.prep.outputs.version }}
      tags: ${{ steps.prep.outputs.tags }}

    steps:
    - uses: actions/checkout@v3
    - name: Docker Prep
      id: prep
      run: |
        DOCKER_IMAGE="$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')"
        VERSION=edge
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        elif [[ $GITHUB_REF == refs/heads/* ]]; then
          VERSION=$(echo ${GITHUB_REF#refs/heads/} | sed -r 's#/+#-#g')
        elif [[ $GITHUB_REF == refs/pull/* ]]; then
          VERSION=pr-${{ github.event.number }}
        fi
        TAGS="${DOCKER_IMAGE}:${VERSION}"
        if [ "${{ github.event_name }}" = "push" ]; then
          TAGS="$TAGS,${DOCKER_IMAGE}:sha-${GITHUB_SHA::8}"
        fi
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          TAGS="$TAGS,${DOCKER_IMAGE}:latest"
        fi
        echo version=${VERSION} >> $GITHUB_OUTPUT
        echo tags=${TAGS} >> $GITHUB_OUTPUT
        echo created=$(date -u +'%Y-%m-%dT%H:%M:%SZ') >> $GITHUB_OUTPUT
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Login to Github Container Registry
      uses: docker/login-action@v2
      with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.prep.outputs.tags }}
        labels: |
          org.opencontainers.image.source=${{ github.event.repository.html_url }}
          org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        generate_release_notes: true
        make_latest: true
        body: |
          ## Docker Image

          ```
          docker pull ghcr.io/${{ github.repository }}:${{ needs.build.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}:latest
          ```
