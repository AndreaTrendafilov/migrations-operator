name: main
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - v*
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.20"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=300s

  test:
    name: Test
    runs-on: ubuntu-latest

    # TODO Set up Kind for integration tests.

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.20"
          cache: true
      - name: Install envtest binaries (etcd, kube-apiserver, kubectl)
        run: |
          set -euo pipefail
          os=$(go env GOOS)
          arch=$(go env GOARCH)
          # Match k8s.io/client-go in go.mod; old storage.googleapis.com/kubebuilder-tools URLs are dead (see kubebuilder discussion #4082).
          k8s_minor=1.25.0
          tag="envtest-v${k8s_minor}"
          url="https://github.com/kubernetes-sigs/controller-tools/releases/download/${tag}/${tag}-${os}-${arch}.tar.gz"
          curl -fsSL "$url" | tar -xz -C /tmp/
          echo "KUBEBUILDER_ASSETS=/tmp/controller-tools/envtest" >> "$GITHUB_ENV"
      - run: make test

  build:
    name: Container Build
    runs-on: ubuntu-latest
    needs:
      - test
      - lint
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - uses: actions/checkout@v6
      - name: Image name (GHCR must be lowercase)
        id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Docker meta (versioning / tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=run-${{ github.run_id }},enable=true
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Image name (GHCR must be lowercase)
        id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker Image

            ```
            docker pull ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            docker pull ${{ steps.image.outputs.name }}:latest
            ```
